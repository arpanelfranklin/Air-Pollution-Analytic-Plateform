kind: Deployment
apiVersion: apps/v1
metadata: 
  name: backend
  namespace: airpollution
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: backend
  template: 
    metadata:
      labels: 
        app: backend
    spec: 
      containers:
      - name: container 
        image: arpanel/apap-backend:v1.0.0-eff0424
        ports: 
          - containerPort: 8080
        env: 
          - name: SPRING_DATA_MONGODB_URI
            valueFrom: 
              secretKeyRef: 
                name: secret
                key: mongo-uri 
        resources: 
          requests: 
            memory: "128Mi"
            cpu: "100m"
          limits: 
            memory: "256Mi"
            cpu: "200m"
          
